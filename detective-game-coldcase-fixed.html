<script>
/* ═══════════════════════════════════════════════════════════════
   🤖 DETECTIVE AUTO-BOT  — v11 (full naturalistic movement)

   Plays through the game automatically with human-like input.
   Every interaction goes through this pipeline:

     scroll into view → cursor travels along an arc → reading
     dwell → press ring → synthetic DOM event chain → cursor fade

   ALL FIXES:
   1. Smooth glide scroll  — scrollIntoView({behavior:'smooth'})
                             waits ~430ms to settle before pressing
   2. Reading dwell        — pause ∝ word count of element text
                             (~48 ms/word, clamped 300–2200 ms)
   3. Click offset         — random point in inner 60% of element
                             so we never always hit dead-center
   4. Cursor trail         — persistent #bot-cursor dot animates
                             along a quadratic bezier arc with a
                             random mid-point wobble; travel time
                             scales with distance (180–700 ms)
   5. Hesitation           — 25% chance to false-hover a decoy
                             element first, dwell 400–900 ms, then
                             glide to the real target
   6. Synthetic events     — full pointerover → pointerdown →
                             pointerup → click chain with real
                             clientX/Y instead of calling JS fns
   7. Tab scan             — 40% chance to visit 1–2 decoy tabs
                             before navigating to the correct one
   8. Swipe scroll         — when target is off-screen, the cursor
                             presses near the bottom of the viewport
                             and drags up (thumb-swipe gesture) while
                             the page scroll animates — mimics phone
                             touch behaviour instead of teleporting

   Tunables (top of file):
     BOT_DELAY            base tick interval ms (±30% jitter)
     BOT_PAIR_ACCURACY    % chance to pick the correct clue pair
     BOT_CAT_ACCURACY     % chance to pick the correct category
     HESITATE_CHANCE      % chance to false-hover before clicking
═══════════════════════════════════════════════════════════════ */
(function () {

  /* ── Config ──────────────────────────────────────────────── */
  const BOT_NAME       = '侦探机器人';
  const BOT_ARCHETYPE  = 'sleuth';
  let   BOT_DELAY         = 3200;  // base ms between bot ticks
  let   BOT_PAIR_ACCURACY = 100;
  let   BOT_CAT_ACCURACY  = 100;

  // Naturalism knobs
  const HESITATE_CHANCE   = 25;    // % chance to false-hover before clicking
  const TAB_SCAN_CHANCE   = 40;    // % chance to scan decoy tabs first
  const BTN_DWELL         = 280;   // ms dwell on buttons/modals (no reading)

  const ALL_CATEGORIES = ['作案手段', '作案动机', '作案时机', '关键证据'];

  function rollSuccess(pct) { return Math.random() * 100 < pct; }

  function wrongCategory(correct) {
    const opts = ALL_CATEGORIES.filter(c => c !== correct);
    return opts[Math.floor(Math.random() * opts.length)];
  }

  function randomWrongClue(s, caseData, targetPair) {
    const allClues = [];
    for (const sec of Object.values(caseData.sections))
      for (const c of sec.clues) allClues.push(c.id);
    for (const sus of Object.values(caseData.suspects))
      for (const sec of Object.values(sus.detailSections))
        for (const c of sec.clues) allClues.push(c.id);
    const candidates = allClues.filter(id =>
      !s.matchedClues.has(id) && id !== targetPair.a && id !== targetPair.b
    );
    if (!candidates.length) return null;
    return candidates[Math.floor(Math.random() * candidates.length)];
  }


  /* ── Visual layer: styles ────────────────────────────────── */
  function injectPressStyles() {
    if (document.getElementById('bot-press-css')) return;
    const s = document.createElement('style');
    s.id = 'bot-press-css';
    s.textContent = `
      @keyframes botRipple {
        0%   { transform: translate(-50%,-50%) scale(0.1); opacity: 1; }
        65%  { transform: translate(-50%,-50%) scale(1);   opacity: 0.5; }
        100% { transform: translate(-50%,-50%) scale(1.5); opacity: 0; }
      }
      @keyframes botDot {
        0%   { transform: translate(-50%,-50%) scale(1);   opacity: 1; }
        100% { transform: translate(-50%,-50%) scale(0.4); opacity: 0; }
      }
      /* Ghost cursor dot that glides across the screen */
      #bot-cursor {
        position: fixed;
        pointer-events: none;
        z-index: 2147483646;
        width: 13px;
        height: 13px;
        border-radius: 50%;
        background: rgba(56,217,255,0.9);
        box-shadow: 0 0 10px rgba(56,217,255,0.7), 0 0 3px rgba(56,217,255,1);
        transform: translate(-50%,-50%);
        transition: left 0s linear, top 0s linear;
        opacity: 0;
      }
      #bot-cursor.visible {
        opacity: 1;
      }
      .bot-press-ring {
        position: fixed; pointer-events: none; z-index: 2147483647;
        width: 52px; height: 52px; border-radius: 50%;
        border: 2.5px solid rgba(56,217,255,0.85);
        background: rgba(56,217,255,0.12);
        animation: botRipple 0.52s cubic-bezier(.2,.6,.4,1) forwards;
      }
      .bot-press-dot {
        position: fixed; pointer-events: none; z-index: 2147483647;
        width: 9px; height: 9px; border-radius: 50%;
        background: rgba(56,217,255,1);
        box-shadow: 0 0 8px rgba(56,217,255,0.8);
        animation: botDot 0.38s ease-out forwards;
      }
      /* FIX 8: thumb-hold ring — stays visible during a swipe */
      #bot-thumb {
        position: fixed;
        pointer-events: none;
        z-index: 2147483645;
        width: 38px;
        height: 38px;
        border-radius: 50%;
        border: 2px solid rgba(56,217,255,0.55);
        background: rgba(56,217,255,0.15);
        box-shadow: 0 0 18px rgba(56,217,255,0.35);
        transform: translate(-50%,-50%);
        opacity: 0;
        transition: opacity 0.15s ease;
      }
      #bot-thumb.visible { opacity: 1; }
    `;
    document.head.appendChild(s);
  }

  /* ── Ghost cursor state ──────────────────────────────────── */
  // Last known cursor position — starts near top-left
  let cursorX = 120;
  let cursorY = 80;
  let cursorEl = null;

  function ensureCursor() {
    injectPressStyles();
    if (!cursorEl) {
      cursorEl = document.createElement('div');
      cursorEl.id = 'bot-cursor';
      document.body.appendChild(cursorEl);
      cursorEl.style.left = cursorX + 'px';
      cursorEl.style.top  = cursorY + 'px';
    }
    return cursorEl;
  }

  /* Ease function: ease-in-out cubic */
  function easeInOut(t) {
    return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
  }

  /* FIX 4: Animate the ghost cursor from (cursorX,cursorY) to
     (tx,ty) over `duration` ms using rAF, then call onDone.
     Adds a tiny random wobble mid-path to look less mechanical. */
  function animateCursor(tx, ty, duration, onDone) {
    const c  = ensureCursor();
    c.classList.add('visible');

    const startX = cursorX;
    const startY = cursorY;
    const startT = performance.now();

    // Random mid-point offset for a slight arc (max ±40px)
    const wobX = (Math.random() - 0.5) * 40;
    const wobY = (Math.random() - 0.5) * 40;

    function step(now) {
      const elapsed = now - startT;
      const raw = Math.min(elapsed / duration, 1);
      const t   = easeInOut(raw);

      // Quadratic bezier: P0 → mid → P1
      const mid = 0.5;
      const bx = (1 - t) * (1 - t) * startX
               + 2 * (1 - t) * t   * (startX + (tx - startX) * mid + wobX)
               + t * t             * tx;
      const by = (1 - t) * (1 - t) * startY
               + 2 * (1 - t) * t   * (startY + (ty - startY) * mid + wobY)
               + t * t             * ty;

      c.style.left = bx + 'px';
      c.style.top  = by + 'px';

      if (raw < 1) {
        requestAnimationFrame(step);
      } else {
        cursorX = tx;
        cursorY = ty;
        if (onDone) onDone();
      }
    }

    requestAnimationFrame(step);
  }

  /* Hide the cursor dot after a brief pause post-click */
  function hideCursorSoon() {
    setTimeout(() => {
      if (cursorEl) cursorEl.classList.remove('visible');
    }, 600);
  }

  /* ── Press ring (fires at exact target point) ────────────── */
  function showPress(x, y) {
    ['bot-press-ring', 'bot-press-dot'].forEach(cls => {
      const el = document.createElement('div');
      el.className = cls;
      el.style.left = x + 'px';
      el.style.top  = y + 'px';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 600);
    });
  }

  /* Pick a slightly random point in the inner 60% of element */
  function randomPointInEl(el) {
    const r = el.getBoundingClientRect();
    if (!r.width && !r.height) return null;
    const padX = r.width  * 0.2;
    const padY = r.height * 0.2;
    const x = r.left + padX + Math.random() * (r.width  - padX * 2);
    const y = r.top  + padY + Math.random() * (r.height - padY * 2);
    return { x, y };
  }

  /* ── FIX 8: Visible swipe gesture for scrolling ───────────── *
   *  Mimics a phone-style thumb swipe before the actual scroll  *
   *  lands. Cursor moves to the start point, a thumb-hold ring  *
   *  appears, then cursor + ring drag in the swipe direction    *
   *  while scrollIntoView animates the page. After the gesture  *
   *  releases, onDone fires so the rest of the pipeline runs.   */
  function swipeScroll(el, onDone) {
    if (!el) { onDone(); return; }

    const r = el.getBoundingClientRect();
    const vh = window.innerHeight;
    const vw = window.innerWidth;
    const scrollingDown = r.top > vh / 2;  // target below fold → swipe up

    // Swipe path: start near the bottom (for scroll-down) or top (scroll-up)
    // X stays roughly centered with slight jitter so it isn't dead center
    const xJitter = (Math.random() - 0.5) * (vw * 0.2);
    const startX  = vw / 2 + xJitter;
    const endX    = startX + (Math.random() - 0.5) * 30; // tiny lateral drift

    const startY  = scrollingDown ? vh * 0.72 : vh * 0.28;
    const endY    = scrollingDown ? vh * 0.32 : vh * 0.72;

    ensureCursor();
    injectPressStyles();

    // Step 1: glide the existing ghost cursor to the swipe start point
    const travelToStart = Math.min(500, Math.max(200,
      Math.hypot(startX - cursorX, startY - cursorY) * 1.4));

    animateCursor(startX, startY, travelToStart, () => {
      // Step 2: thumb-hold ring appears at the press point
      let thumb = document.getElementById('bot-thumb');
      if (!thumb) {
        thumb = document.createElement('div');
        thumb.id = 'bot-thumb';
        document.body.appendChild(thumb);
      }
      thumb.style.left = startX + 'px';
      thumb.style.top  = startY + 'px';
      // force reflow so the fade-in transition fires
      void thumb.offsetWidth;
      thumb.classList.add('visible');

      // Step 3: short hold (touch settle) before the drag starts
      setTimeout(() => {
        // Step 4: kick off the real scroll alongside the visible drag
        el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

        // Step 5: animate cursor + thumb together along the swipe arc
        const dragMs = 380 + Math.random() * 120; // 380–500 ms
        const startT = performance.now();

        function dragStep(now) {
          const raw = Math.min((now - startT) / dragMs, 1);
          // Ease-out so the gesture decelerates like a real flick
          const t = 1 - Math.pow(1 - raw, 2);
          const x = startX + (endX - startX) * t;
          const y = startY + (endY - startY) * t;
          thumb.style.left = x + 'px';
          thumb.style.top  = y + 'px';
          if (cursorEl) {
            cursorEl.style.left = x + 'px';
            cursorEl.style.top  = y + 'px';
          }
          cursorX = x;
          cursorY = y;
          if (raw < 1) requestAnimationFrame(dragStep);
          else {
            // Step 6: release — fade thumb out, wait for scroll to settle
            thumb.classList.remove('visible');
            setTimeout(() => {
              if (thumb && thumb.parentNode) thumb.remove();
              // Give scrollIntoView a moment to finish after the drag ends
              setTimeout(onDone, 200);
            }, 180);
          }
        }
        requestAnimationFrame(dragStep);
      }, 140 + Math.random() * 80); // 140–220ms touch-settle
    });
  }


  /* ── Master action dispatcher ────────────────────────────── *
   *  Full sequence per action:                                 *
   *  1. scroll element into view (with visible swipe if off)  *
   *  2. wait for scroll to settle                             *
   *  3. compute travel distance → derive cursor move duration *
   *  4. animate cursor to target (bezier arc)                 *
   *  5. reading dwell at target                               *
   *  6. show press ring                                       *
   *  7. fire action 90 ms later                              *
   *  8. hide cursor shortly after                             */
  function scrollThenPress(el, action, readMs) {
    if (!el) { action(); return; }

    injectPressStyles();

    const r = el.getBoundingClientRect();
    const inView = r.top >= 0 && r.bottom <= window.innerHeight;

    // FIX 8: when off-screen, perform a visible swipe gesture
    // BEFORE running the standard travel→dwell→press pipeline.
    const afterScroll = () => {
      // Re-measure after scroll settled
      const r2  = el.getBoundingClientRect();
      const pt  = randomPointInEl(el) || { x: r2.left + r2.width / 2, y: r2.top + r2.height / 2 };

      const dx  = pt.x - cursorX;
      const dy  = pt.y - cursorY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const travelMs = Math.min(700, Math.max(180, dist * 1.6));

      animateCursor(pt.x, pt.y, travelMs, () => {
        setTimeout(() => {
          showPress(pt.x, pt.y);
          setTimeout(() => {
            action(pt.x, pt.y);
            hideCursorSoon();
          }, 90);
        }, readMs || 0);
      });
    };

    if (inView) {
      afterScroll();
    } else {
      swipeScroll(el, afterScroll);
    }
  }

  /* Convenience wrapper */
  function pressOnclick(snippet, action, readMs) {
    const el = document.querySelector('[onclick*="' + snippet + '"]');
    scrollThenPress(el, action, readMs || 0);
  }


  /* ── Reading-dwell calculator ────────────────────────────── */
  function readDwell(el) {
    if (!el) return 300;
    const words = (el.textContent || '').trim().split(/\s+/).length;
    const ms = words * 48;
    return Math.min(2200, Math.max(300, ms));
  }

  /* ── FIX 7: Synthetic DOM event sequence ────────────────── *
   * Instead of calling window.handleClueClick() directly,     *
   * dispatch the full browser event chain that a real finger  *
   * or mouse produces:                                        *
   *   pointerover → mouseover → pointermove → pointerdown     *
   *   → mousedown → pointerup → mouseup → click              *
   * clientX/Y are set to the press-ring coords so event       *
   * resolution, hover states, and pointer listeners all work  *
   * exactly as a real tap would trigger them.                 */
  function syntheticClick(el, x, y) {
    if (!el) return;
    const opts = {
      bubbles:    true,
      cancelable: true,
      view:       window,
      clientX:    x || 0,
      clientY:    y || 0,
      screenX:    x || 0,
      screenY:    y || 0,
      buttons:    1,
      button:     0,
      pointerId:  1,
      pointerType:'mouse',
      isPrimary:  true,
    };
    el.dispatchEvent(new PointerEvent('pointerover',  { ...opts, buttons: 0 }));
    el.dispatchEvent(new PointerEvent('pointerenter', { ...opts, buttons: 0 }));
    el.dispatchEvent(new MouseEvent  ('mouseover',    { ...opts, buttons: 0 }));
    el.dispatchEvent(new MouseEvent  ('mouseenter',   { ...opts, buttons: 0 }));
    el.dispatchEvent(new PointerEvent('pointermove',  opts));
    el.dispatchEvent(new MouseEvent  ('mousemove',    opts));
    el.dispatchEvent(new PointerEvent('pointerdown',  opts));
    el.dispatchEvent(new MouseEvent  ('mousedown',    opts));
    el.dispatchEvent(new PointerEvent('pointerup',    opts));
    el.dispatchEvent(new MouseEvent  ('mouseup',      opts));
    el.dispatchEvent(new MouseEvent  ('click',        opts));
  }


  /* ── State ───────────────────────────────────────────────── */
  let botActive   = false;
  let botTimer    = null;
  let botBusy     = false;
  let botPairIdx    = 0;
  let botResultDone = false;


  /* ── Tick ────────────────────────────────────────────────── */
  function botTick() {
    if (!botActive || botBusy) return;
    const s = window.state;
    if (!s) return;

    botBusy = true;

    switch (s.screen) {

      case 'menu':
        s.screen = 'character';
        window.render();
        break;

      case 'character':
        window.setDetectiveName(BOT_NAME);
        s.detective.name      = BOT_NAME;
        s.detective.archetype = BOT_ARCHETYPE;
        window.render();
        setTimeout(() => {
          if (botActive) {
            const btn = document.querySelector('.char-confirm-btn');
            scrollThenPress(btn, (x,y) => syntheticClick(btn, x, y), BTN_DWELL);
          }
        }, 300);
        break;

      case 'select': {
        const cards = document.querySelectorAll('.case-card:not([style*="cursor:not-allowed"])');
        if (cards.length) {
          botPairIdx    = 0;
          botResultDone = false;
          scrollThenPress(cards[0], (x,y) => syntheticClick(cards[0], x, y), BTN_DWELL);
        }
        break;
      }

      case 'briefing': {
        const btn = document.querySelector('.btn-begin');
        scrollThenPress(btn, (x,y) => syntheticClick(btn, x, y), BTN_DWELL);
        break;
      }

      case 'investigate':
        botInvestigate(s);
        break;

      case 'result':
        if (!botResultDone) {
          botResultDone = true;
          setTimeout(() => {
            if (botActive && window.state.screen === 'result') {
              botPairIdx    = 0;
              botResultDone = false;
              window.backToSelect();
            }
          }, 2500);
        }
        break;
    }

    setTimeout(() => { botBusy = false; }, 200);
  }


  /* ── Investigation logic ─────────────────────────────────── */
  /* ── FIX 6: False-hover helpers ─────────────────────────── *
   * hoverThenMove(decoyEl, targetEl, action, readMs)           *
   * Glides to decoyEl, dwells briefly as if reconsidering,    *
   * then glides to the real target and fires the action.      *
   * Used ~25% of the time on clue picks to add hesitation.    */

  function hoverThenMove(decoyEl, targetEl, action, readMs) {
    if (!decoyEl || !targetEl) {
      scrollThenPress(targetEl, action, readMs);
      return;
    }

    // Step 1: scroll decoy into view if needed, then move cursor there
    const dr = decoyEl.getBoundingClientRect();
    const decoyInView = dr.top >= 0 && dr.bottom <= window.innerHeight;

    // FIX 8: if scrolling needed, do a visible swipe first
    const afterDecoyScroll = () => {
      const dr2    = decoyEl.getBoundingClientRect();
      const padX   = dr2.width  * 0.2;
      const padY   = dr2.height * 0.2;
      const decoyX = dr2.left + padX + Math.random() * (dr2.width  - padX * 2);
      const decoyY = dr2.top  + padY + Math.random() * (dr2.height - padY * 2);

      const dx1   = decoyX - cursorX;
      const dy1   = decoyY - cursorY;
      const dist1 = Math.sqrt(dx1 * dx1 + dy1 * dy1);
      const travel1 = Math.min(700, Math.max(180, dist1 * 1.6));

      // Move to decoy — no click, just hover
      animateCursor(decoyX, decoyY, travel1, () => {

        // Dwell on the decoy as if reading it (~400–900 ms)
        const hesitateMs = 400 + Math.random() * 500;
        setTimeout(() => {

          // Step 2: now move to the real target and press
          const tr = targetEl.getBoundingClientRect();
          const tInView = tr.top >= 0 && tr.bottom <= window.innerHeight;

          const afterTargetScroll = () => {
            const tr2  = targetEl.getBoundingClientRect();
            const tPadX = tr2.width  * 0.2;
            const tPadY = tr2.height * 0.2;
            const tx   = tr2.left + tPadX + Math.random() * (tr2.width  - tPadX * 2);
            const ty   = tr2.top  + tPadY + Math.random() * (tr2.height - tPadY * 2);

            const dx2   = tx - cursorX;
            const dy2   = ty - cursorY;
            const dist2 = Math.sqrt(dx2 * dx2 + dy2 * dy2);
            const travel2 = Math.min(700, Math.max(180, dist2 * 1.6));

            animateCursor(tx, ty, travel2, () => {
              setTimeout(() => {
                showPress(tx, ty);
                setTimeout(() => {
                  action(tx, ty);
                  hideCursorSoon();
                }, 90);
              }, readMs || 0);
            });
          };

          if (tInView) afterTargetScroll();
          else         swipeScroll(targetEl, afterTargetScroll);

        }, hesitateMs);
      });
    };

    if (decoyInView) afterDecoyScroll();
    else             swipeScroll(decoyEl, afterDecoyScroll);
  }

  /* Pick a random visible clue element that is NOT the target */
  function randomNearbyClueEl(targetId) {
    const all = Array.from(document.querySelectorAll('.clue-item:not(.matched)'));
    const others = all.filter(el => {
      const oc = el.getAttribute('onclick') || '';
      return !oc.includes(targetId);
    });
    if (!others.length) return null;
    return others[Math.floor(Math.random() * others.length)];
  }


  function botInvestigate(s) {

    // 1. Dismiss breakthrough overlay
    if (s.pendingBreakthrough) {
      const btn = document.querySelector('.breakthrough-dismiss');
      scrollThenPress(btn, (x,y) => syntheticClick(btn, x, y), BTN_DWELL);
      return;
    }

    // 2. Category modal
    if (s.pendingPair) {
      const cat = s.pendingPair.pair.category;
      if (!rollSuccess(BOT_CAT_ACCURACY)) {
        const bad    = wrongCategory(cat);
        const badBtn = document.querySelector('.cat-btn[onclick*="submitCategory(\'' + bad + '\')"]');
        scrollThenPress(badBtn, (x,y) => syntheticClick(badBtn, x, y), BTN_DWELL);
      } else {
        const goodBtn = document.querySelector('.cat-btn[onclick*="submitCategory(\'' + cat + '\')"]');
        if (rollSuccess(HESITATE_CHANCE)) {
          const badCat   = wrongCategory(cat);
          const decoyBtn = document.querySelector('.cat-btn[onclick*="submitCategory(\'' + badCat + '\')"]');
          hoverThenMove(decoyBtn, goodBtn, (x,y) => syntheticClick(goodBtn, x, y), BTN_DWELL);
        } else {
          scrollThenPress(goodBtn, (x,y) => syntheticClick(goodBtn, x, y), BTN_DWELL);
        }
      }
      return;
    }

    // 3. Section label modal
    if (s.pendingSection) {
      const name    = s.pendingSection.sectionName;
      const btns    = document.querySelectorAll('.section-opt-btn');
      const btn     = Array.from(btns).find(b => b.textContent.trim() === name);
      const target  = btn || btns[0];
      const preview = document.querySelector('.cat-modal-preview');
      const dwell   = readDwell(preview);
      if (rollSuccess(HESITATE_CHANCE) && btns.length > 1) {
        const wrongBtn = Array.from(btns).find(b => b.textContent.trim() !== name);
        hoverThenMove(wrongBtn, target, (x,y) => syntheticClick(target, x, y), dwell);
      } else {
        scrollThenPress(target, (x,y) => syntheticClick(target, x, y), dwell);
      }
      return;
    }

    // 4. Confirm accusation
    if (s.confirmAccuse) {
      const btn = document.querySelector('.confirm-btn-yes');
      scrollThenPress(btn, (x,y) => syntheticClick(btn, x, y), BTN_DWELL);
      return;
    }

    // 5. If clue already selected, click the partner clue
    if (s.selectedClue) {
      const caseData = window.getCaseData();
      if (!caseData) return;
      const targetPair = getNextPair(s, caseData.goldenPairs);
      if (!targetPair) { window.clearStagedClue(); return; }
      if (s.selectedClue !== targetPair.a && s.selectedClue !== targetPair.b) {
        window.clearStagedClue(); return;
      }
      const second   = (s.selectedClue === targetPair.a) ? targetPair.b : targetPair.a;
      const secondEl = document.querySelector('[onclick*="handleClueClick(\'' + second + '\')"]');
      const dwell    = readDwell(secondEl);
      if (rollSuccess(HESITATE_CHANCE)) {
        const decoy = randomNearbyClueEl(second);
        hoverThenMove(decoy, secondEl, (x,y) => syntheticClick(secondEl, x, y), dwell);
      } else {
        scrollThenPress(secondEl, (x,y) => syntheticClick(secondEl, x, y), dwell);
      }
      return;
    }

    // 6. Can accuse?
    if (window.canAccuse()) {
      const caseData = window.getCaseData();
      if (!caseData) return;
      const btn = document.querySelector('.accuse-btn:not(.locked)');
      scrollThenPress(btn, (x,y) => syntheticClick(btn, x, y), BTN_DWELL);
      return;
    }

    // 7. Work through unmatched golden pairs — with tab scan
    const caseData = window.getCaseData();
    if (!caseData) return;
    const pair = getNextPair(s, caseData.goldenPairs);
    if (!pair) return;

    // Determine which tab the target clue lives in
    const targetTab = clueTab(pair.a, caseData) || clueTab(pair.b, caseData);

    // FIX 8: If the bot needs to switch tabs, optionally scan 1-2
    // decoy tabs first before landing on the correct one.
    // ~40% chance to do a scan when already on a different tab.
    const alreadyOnTab = (s.activeTab === targetTab);
    if (!alreadyOnTab && targetTab && rollSuccess(TAB_SCAN_CHANCE)) {
      tabScanThenGo(s, targetTab, caseData, pair);
      return;
    }

    // Already on the right tab (or no scan this time) — just pick
    if (!alreadyOnTab && targetTab) {
      // Switch directly without scan
      const tabEl = document.querySelector('.inv-tab[onclick*="setActiveTab(\'' + targetTab.replace(/'/g, "\\'") + '\')"]');
      if (tabEl) {
        scrollThenPress(tabEl, (x,y) => syntheticClick(tabEl, x, y), BTN_DWELL);
        return;
      }
    }

    // On the correct tab — now pick the clue
    if (!rollSuccess(BOT_PAIR_ACCURACY)) {
      const wrongId = randomWrongClue(s, window.getCaseData(), pair);
      if (wrongId) {
        const wrongEl = document.querySelector('[onclick*="handleClueClick(\'' + wrongId + '\')"]');
        scrollThenPress(wrongEl, (x,y) => syntheticClick(wrongEl, x, y), readDwell(wrongEl));
        return;
      }
    }

    const firstEl = document.querySelector('[onclick*="handleClueClick(\'' + pair.a + '\')"]');
    if (rollSuccess(HESITATE_CHANCE)) {
      const decoy = randomNearbyClueEl(pair.a);
      hoverThenMove(decoy, firstEl, (x,y) => syntheticClick(firstEl, x, y), readDwell(firstEl));
    } else {
      scrollThenPress(firstEl, (x,y) => syntheticClick(firstEl, x, y), readDwell(firstEl));
    }
  }

  /* ── FIX 8: helpers ──────────────────────────────────────── */

  /* Return the activeTab key that contains clueId */
  function clueTab(clueId, caseData) {
    for (const tabName of Object.keys(caseData.sections)) {
      if (caseData.sections[tabName].clues.some(c => c.id === clueId)) return tabName;
    }
    for (const [key, sus] of Object.entries(caseData.suspects)) {
      for (const secName of Object.keys(sus.detailSections)) {
        if (sus.detailSections[secName].clues.some(c => c.id === clueId))
          return 'suspect_' + key;
      }
    }
    return null;
  }

  /* Collect all visible tab elements */
  function allTabEls() {
    return Array.from(document.querySelectorAll('.inv-tab'));
  }

  /* Pick 1–2 random tabs that are NOT the target */
  function pickDecoyTabs(targetTab, count) {
    const tabs = allTabEls().filter(el => {
      const oc = el.getAttribute('onclick') || '';
      return !oc.includes(targetTab.replace(/'/g, "\\'"));
    });
    const shuffled = tabs.sort(() => Math.random() - 0.5);
    return shuffled.slice(0, count);
  }

  /* Visit decoy tabs sequentially, then click the real tab.
     Each decoy: move cursor → click → dwell briefly (scan read).
     Uses recursive setTimeout chain so botBusy stays false
     between outer ticks while we're mid-scan.                  */
  function tabScanThenGo(s, targetTab, caseData, pair) {
    const numDecoys = 1 + Math.floor(Math.random() * 2); // 1 or 2
    const decoys    = pickDecoyTabs(targetTab, numDecoys);
    const targetEl  = document.querySelector('.inv-tab[onclick*="setActiveTab(\'' + targetTab.replace(/'/g, "\\'") + '\')"]');

    // Build a flat action list: [decoy1, decoy2?, target]
    const steps = [...decoys, targetEl].filter(Boolean);

    function runStep(i) {
      if (!botActive) return;
      if (i >= steps.length) return; // done
      const el = steps[i];
      const isLast = (i === steps.length - 1);

      // Dwell: decoy tabs get a quick scan (300–700 ms), target gets BTN_DWELL
      const dwell = isLast ? BTN_DWELL : 300 + Math.random() * 400;

      scrollThenPress(el, (x, y) => {
        syntheticClick(el, x, y);
        // After clicking, wait for the dwell + a render gap then continue
        setTimeout(() => runStep(i + 1), dwell + 180);
      }, dwell);
    }

    runStep(0);
  }

  function getNextPair(s, pairs) {
    for (let i = 0; i < pairs.length; i++) {
      const p = pairs[i];
      if (!s.matchedClues.has(p.a) && !s.matchedClues.has(p.b)) return p;
    }
    return null;
  }



  /* ── Panel open/close ───────────────────────────────────── */
  let panelOpen = false;

  function togglePanel() {
    panelOpen = !panelOpen;
    updateBotUI();
  }

  function startBot() {
    if (botActive) return;
    botActive = true;
    botBusy   = false;
    scheduleBotTick();
    updateBotUI();
  }

  function scheduleBotTick() {
    if (!botActive) return;
    const jitter = BOT_DELAY * (0.7 + Math.random() * 0.6);
    botTimer = setTimeout(() => {
      botTick();
      if (botActive) scheduleBotTick();
    }, jitter);
  }

  function pauseBot() {
    if (!botActive) return;
    botActive = false;
    clearTimeout(botTimer);
    botTimer = null;
    updateBotUI();
  }

  function stopBot() {
    botActive = false;
    clearTimeout(botTimer);
    botTimer = null;
    botPairIdx = 0;
    botResultDone = false;
    updateBotUI();
  }

  function setBotSpeed(val) {
    const speeds = {
      1: 5500, 2: 4200, 3: 3200, 4: 2400, 5: 1800,
      6: 1200, 7: 800,  8: 500,  9: 250
    };
    BOT_DELAY = speeds[val] || 3200;
    const lbl = document.getElementById('bot-speed-lbl');
    const labels = {
      1:'真实', 2:'慢速', 3:'稳速', 4:'正常',
      5:'稍快', 6:'快速', 7:'很快', 8:'极速', 9:'闪电'
    };
    if (lbl) lbl.textContent = labels[val] || '稳速';
  }

  function setBotPairAccuracy(val) {
    BOT_PAIR_ACCURACY = +val;
    const lbl = document.getElementById('bot-pair-acc-lbl');
    if (lbl) lbl.textContent = val + '%';
  }

  function setBotCatAccuracy(val) {
    BOT_CAT_ACCURACY = +val;
    const lbl = document.getElementById('bot-cat-acc-lbl');
    if (lbl) lbl.textContent = val + '%';
  }

  function updateBotUI() {
    const btn       = document.getElementById('bot-toggle-btn');
    const dropdown  = document.getElementById('bot-dropdown');
    const statusEl  = document.getElementById('bot-status');
    const dotEl     = document.getElementById('bot-status-dot');
    const startBtn  = document.getElementById('bot-start-btn');
    const pauseBtn  = document.getElementById('bot-pause-btn');
    const stopBtn   = document.getElementById('bot-stop-btn');
    if (!btn) return;

    if (dropdown) dropdown.style.display = panelOpen ? 'flex' : 'none';

    if (botActive) {
      btn.style.borderColor = '#34e589';
      btn.style.boxShadow   = '0 0 14px rgba(52,229,137,0.35)';
      btn.style.background  = 'rgba(52,229,137,0.08)';
    } else {
      btn.style.borderColor = panelOpen ? 'rgba(56,217,255,0.5)' : 'rgba(56,217,255,0.25)';
      btn.style.boxShadow   = panelOpen ? '0 0 10px rgba(56,217,255,0.2)' : '';
      btn.style.background  = 'rgba(14,19,25,0.95)';
    }

    if (statusEl && dotEl) {
      if (botActive) {
        statusEl.textContent = '运行中';
        statusEl.style.color = '#34e589';
        dotEl.style.background = '#34e589';
        dotEl.style.boxShadow  = '0 0 6px rgba(52,229,137,0.6)';
      } else {
        statusEl.textContent = '已停止';
        statusEl.style.color = '#555577';
        dotEl.style.background = '#555577';
        dotEl.style.boxShadow  = 'none';
      }
    }

    if (startBtn) {
      startBtn.style.opacity = botActive ? '0.4' : '1';
      startBtn.style.pointerEvents = botActive ? 'none' : 'auto';
    }
    if (pauseBtn) {
      pauseBtn.style.opacity = botActive ? '1' : '0.4';
      pauseBtn.style.pointerEvents = botActive ? 'auto' : 'none';
    }
    if (stopBtn) {
      stopBtn.style.opacity = botActive ? '1' : '0.4';
      stopBtn.style.pointerEvents = botActive ? 'auto' : 'none';
    }
  }

  /* ── Bootstrap ───────────────────────────────────────────── */
  window._detectiveBot = {
    togglePanel,
    start:      startBot,
    pause:      pauseBot,
    stop:       stopBot,
    setSpeed:   setBotSpeed,
    setPairAcc: setBotPairAccuracy,
    setCatAcc:  setBotCatAccuracy,
  };

  function tryInject() {
    if (document.body) {
      injectBotUI();
    } else {
      requestAnimationFrame(tryInject);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', tryInject);
  } else {
    setTimeout(tryInject, 300);
  }

})();
</script>
</body></html>
